name: CI Pipeline — Gestion Achats

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE_BACKEND: gcr.io/${{ secrets.GCP_PROJECT_ID }}/gestion-achats-backend:latest
  IMAGE_FRONTEND: gcr.io/${{ secrets.GCP_PROJECT_ID }}/gestion-achats-frontend:latest

jobs:
  backend:
    name: Backend — Test, Sonar, Build, Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} || true

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=OualiRoudaina_gestion-achats-fournisseurs \
            -Dsonar.organization=oualiroudaina \
            -Dsonar.host.url=https://sonarcloud.io

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker -q

      - name: Build Docker image backend
        run: docker build -t ${{ env.IMAGE_BACKEND }} .

      - name: Scan image Trivy backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_BACKEND }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push image backend
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ env.IMAGE_BACKEND }}

  frontend:
    name: Frontend — Lint, Test, Build, Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Tests unitaires
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build production
        run: npm run build -- --configuration=production

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker -q

      - name: Build Docker image frontend
        run: docker build -t ${{ env.IMAGE_FRONTEND }} .

      - name: Scan image Trivy frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_FRONTEND }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push image frontend
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ env.IMAGE_FRONTEND }}
