apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestion-achats-backend
  namespace: dev
  labels:
    app: gestion-achats-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gestion-achats-backend
  template:
    metadata:
      labels:
        app: gestion-achats-backend
    spec:
      # ✅ User non-root pour la sécurité
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        # ─── Conteneur principal : Backend Spring Boot ───────────────────
        - name: backend
          image: gcr.io/gestion-achats-devops/gestion-achats-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/gestion_achats?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          envFrom:
            - configMapRef:
                name: app-gcp-config

          # ✅ Ressources CPU/RAM
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          # ✅ Startup Probe — attend que Spring Boot démarre (max 3 min)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            timeoutSeconds: 5
            failureThreshold: 36
            periodSeconds: 10

          # ✅ Liveness Probe — redémarre le pod si l'app est bloquée
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3

          # ✅ Readiness Probe — retire le pod du Service s'il n'est pas prêt
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3

        # ─── Sidecar : Prometheus Exporter (monitoring) ──────────────────
        - name: prometheus-exporter
          image: bitnami/jmx-exporter:latest
          ports:
            - containerPort: 9090
              name: metrics
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dev
  labels:
    app: gestion-achats-backend
spec:
  selector:
    app: gestion-achats-backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
  type: ClusterIP

---
# ✅ HPA — scalabilité automatique
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gestion-achats-backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
