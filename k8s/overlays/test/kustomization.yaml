apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: test

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/strategy
        value:
          type: Recreate
    target:
      kind: Deployment
      name: gestion-achats-backend

  - patch: |-
      - op: replace
        path: /spec/strategy
        value:
          type: Recreate
    target:
      kind: Deployment
      name: gestion-achats-frontend

images:
  - name: gcr.io/gestion-achats-devops/gestion-achats-backend
    newTag: test
  - name: gcr.io/gestion-achats-devops/gestion-achats-frontend
    newTag: test
