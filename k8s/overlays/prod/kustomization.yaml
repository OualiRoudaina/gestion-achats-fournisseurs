apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
  - ../../base

images:
  - name: gcr.io/gestion-achats-devops/gestion-achats-backend
    newTag: latest
  - name: gcr.io/gestion-achats-devops/gestion-achats-frontend
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: gestion-achats-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: gestion-achats-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
