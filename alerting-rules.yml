apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gestion-achats-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: gestion-achats
    rules:
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod en CrashLoop"
        description: "Le pod {{ \.pod }} redémarre trop souvent"

    - alert: HighMemoryUsage
      expr: container_memory_usage_bytes > 500000000
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Mémoire élevée"
        description: "Utilisation mémoire > 500MB"

    - alert: PodNotRunning
      expr: kube_pod_status_phase{phase!="Running"} == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod non Running"
        description: "Le pod {{ \.pod }} n'est pas en Running"
